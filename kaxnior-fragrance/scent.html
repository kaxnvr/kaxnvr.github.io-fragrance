<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAXNiOR — By Scent</title>
  <meta name="description" content="The KAXNiOR olfactive library — read every product by its accords and notes, from the first breath to the last trace.">
  <link rel="icon" type="image/svg+xml" href="/kaxnior-fragrance/favicon.svg">
  <meta property="og:title" content="KAXNiOR — By Scent">
  <meta property="og:description" content="The olfactive library — read every product by its accords and notes.">
  <meta property="og:image" content="https://kaxnvr.github.io/kaxnior-fragrance/img/og.jpg?v=2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=Playfair+Display:ital,wght@0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/kaxnior-fragrance/style.css?v=100">
</head>
<body data-page="scent">
  <div class="grain"></div>

  <nav id="site-nav" class="solid" data-nav="solid"></nav>

  <main class="page">

    <!-- INTRO -->
    <section class="page-intro wrap">
      <p class="eyebrow reveal" id="scent-eyebrow">By Scent</p>
      <h1 class="display display-xl reveal" data-d="1" id="scent-title" style="max-width:13ch;margin:0 auto;">The Olfactive Library</h1>
      <p class="lede reveal" data-d="2" id="scent-lede"></p>
    </section>

    <!-- FAMILY ROWS -->
    <section class="wrap section-sm">
      <div id="scent-rows"></div>
    </section>

    <!-- NOTE INDEX -->
    <section class="section band">
      <div class="wrap">
        <div class="center reveal" style="margin-bottom:54px;">
          <p class="eyebrow" style="margin-bottom:22px;">The Index</p>
          <h2 class="display display-m" id="index-title" style="max-width:18ch;margin:0 auto;">Every material in the house</h2>
        </div>
        <div class="note-index reveal" data-d="1" id="note-index"></div>
      </div>
    </section>

  </main>

  <footer id="site-footer"></footer>

  <script src="/kaxnior-fragrance/data.js?v=35"></script>
  <script src="/kaxnior-fragrance/site.js?v=38"></script>
  <script>
    // Which category's library are we reading? ?cat=Lip Balm etc. Defaults to Fragrance.
    const catParam = new URLSearchParams(location.search).get('cat') || 'Fragrance';
    const CAT = CATEGORIES.find((c) => c.label.toLowerCase() === catParam.toLowerCase()) || CATEGORIES[0];

    // Per-category framing copy.
    const COPY = {
      'Fragrance': { eyebrow: 'By Scent', title: 'The Olfactive Library',
        lede: 'Four families, one nature each. Read every fragrance from the first breath to the last trace — top, heart, and base.',
        index: 'Every material in the house' },
      'Hand Cream': { eyebrow: 'By Scent', title: 'The Hand Cream Library',
        lede: 'Two perfumed creams, each a scent drawn into the skin. Read them by the accord at their heart.',
        index: 'Every material in the creams' },
      'Lip Balm': { eyebrow: 'By Shade', title: 'The Lip Balm Library',
        lede: 'Three tinted shades, one weightless care — from bare, through nude, to noir.',
        index: 'Every finish in the range' },
      'Home Fragrance': { eyebrow: 'By Scent', title: 'The Home Fragrance Library',
        lede: 'Two candles and a lava diffuser — the house, held in a room. Read each by its accord.',
        index: 'Every material for the room' },
    };
    const copy = COPY[CAT.label] || COPY['Fragrance'];
    document.getElementById('scent-eyebrow').textContent = copy.eyebrow;
    document.getElementById('scent-title').textContent = copy.title;
    document.getElementById('scent-lede').textContent = copy.lede;
    document.getElementById('index-title').textContent = copy.index;
    document.title = 'KAXNiOR — ' + copy.title;

    // Build the row list. Fragrance keeps its No. + full top/heart/base pyramid;
    // other categories use the flat product accord.
    let rows;
    if (CAT.label === 'Fragrance') {
      rows = FRAGRANCES.map((f) => ({ id: f.id, img: f.img, name: f.name, family: f.family, no: f.no, notes: f.notes, accord: f.accord }));
    } else {
      rows = CAT.ids.filter((id) => id !== '|').map((id) => {
        const p = PRODUCTS[id];
        return { id, img: p.img, name: p.name, family: p.family, notes: p.notes, accord: p.accord };
      });
    }

    function hasPyramid(r) { return r.notes && r.notes.heart && r.notes.heart.length; }

    function noteBlock(r) {
      if (hasPyramid(r)) {
        return `<div class="pyramid">
            <div class="pyramid-tier"><span class="t-label">Top</span><span class="t-notes">${r.notes.top.join(' · ')}</span></div>
            <div class="pyramid-tier"><span class="t-label">Heart</span><span class="t-notes">${r.notes.heart.join(' · ')}</span></div>
            <div class="pyramid-tier"><span class="t-label">Base</span><span class="t-notes">${r.notes.base.join(' · ')}</span></div>
          </div>`;
      }
      return `<div class="pyramid">
          <div class="pyramid-tier"><span class="t-label">Accord</span><span class="t-notes">${(r.accord || []).join(' · ')}</span></div>
        </div>`;
    }

    document.getElementById('scent-rows').innerHTML = rows.map((r) => `
      <div class="scent-row reveal">
        <a class="scent-vis" href="/kaxnior-fragrance/product.html?id=${r.id}"><img src="${window.KX_THUMB ? window.KX_THUMB(r.img) : r.img}" alt="${r.name}" loading="lazy"></a>
        <div>
          <p class="scent-fam">${r.family}</p>
          <h2 class="scent-name">${r.name}${r.no ? `<span class="no">No. ${r.no}</span>` : ''}</h2>
          ${noteBlock(r)}
          <a class="btn-line" href="/kaxnior-fragrance/product.html?id=${r.id}">View ${r.name}</a>
        </div>
      </div>`).join('');

    // Build alphabetical index of every material/finish in this category.
    const all = new Set();
    rows.forEach((r) => {
      if (hasPyramid(r)) [...r.notes.top, ...r.notes.heart, ...r.notes.base].forEach((n) => all.add(n));
      else (r.accord || []).forEach((n) => all.add(n));
    });
    document.getElementById('note-index').innerHTML =
      [...all].sort((a, b) => a.localeCompare(b)).map((n) => `<span>${n}</span>`).join('');

    // reveal observer for injected rows
    document.querySelectorAll('#scent-rows .reveal').forEach((el) => {
      new IntersectionObserver((es, o) => es.forEach((e) => { if (e.isIntersecting) { e.target.classList.add('in'); o.unobserve(e.target); } }), { threshold: 0.1 }).observe(el);
    });
  </script>
</body>
</html>
